egoe Script", cursive;font-size: clamp(3.5rem, 11vw, 8.5rem);font-weight: 500;line-height: .95;letter-spacing: .02em;background: linear-gradient(100deg, var(--gold-1), var(--gold-3), var(--gold-2), var(--gold-1));background-size: 220% auto;-webkit-background-clip: text;background-clip: text;color: transparent;filter: drop-shadow(0 0 18px rgba(255,214,122,.25));animation: shimmer 3.2s linear infinite;}.intro-name p {margin: .85rem 0 0;text-transform: uppercase;font-size: .72rem;letter-spacing: .42em;color: var(--muted);}@keyframes nameReveal { to { opacity: 1; transform: translateY(0); } }@keyframes shimmer { to { background-position: 220% center; } }.artboard {width: min(88vw, 760px);aspect-ratio: 1 / 1.05;position: relative;z-index: 3;margin-top: 9vh;}.dancer-svg, .veil-svg {position: absolute;inset: 0;width: 100%;height: 100%;overflow: visible;}.dancer-line {fill: none;stroke: url(#goldStroke);stroke-width: 5;stroke-linecap: round;stroke-linejoin: round;stroke-dasharray: 1560;stroke-dashoffset: 1560;filter: url(#glow);animation: drawDancer 2.8s 1s cubic-bezier(.58,.02,.34,1) forwards,soften 1s 4.1s ease forwards;}@keyframes drawDancer { to { stroke-dashoffset: 0; } }@keyframes soften { to { opacity: .28; filter: blur(1px) url(#glow); } }.veil-path {fill: none;stroke: url(#veilStroke);stroke-width: 16;stroke-linecap: round;stroke-dasharray: 920;stroke-dashoffset: 920;opacity: 0;filter: url(#veilGlow);animation: veilSweep 2s 3.4s cubic-bezier(.2,.8,.22,1) forwards,veilExit .75s 5.05s ease forwards;}.veil-highlight {fill: none;stroke: rgba(255,255,255,.72);stroke-width: 2;stroke-linecap: round;stroke-dasharray: 920;stroke-dashoffset: 920;opacity: 0;animation: veilSweep 2s 3.45s cubic-bezier(.2,.8,.22,1) forwards,veilExit .75s 5.05s ease forwards;}@keyframes veilSweep {0% { opacity: 0; stroke-dashoffset: 920; }12% { opacity: 1; }100% { opacity: 1; stroke-dashoffset: 0; }}@keyframes veilExit { to { opacity: 0; transform: scale(1.08) rotate(4deg); } }.profile {position: 42 - .21);const distance = 170 + Math.random() * 330;feather.style.setProperty('--x', `${Math.cos(angle) * distance}px`);feather.style.setProperty('--y', `${Math.sin(angle) * distance}px`);feather.style.setProperty('--r', `${-220 + Math.random() * 440}deg`);feather.style.setProperty('--s', `${.55 + Math.random() * 1.2}`);feather.style.setProperty('--delay', `${4.75 + Math.random() * .28}s`);feather.style.setProperty('--feather-color', colors[i % colors.length]);featherLayer.appendChild(feather);}}createFeathers();document.getElementById('skip').addEventListener('click', () => {document.body.classList.add('finished');});document.getElementById('replay').addEventListener('click', () => {document.body.classList.remove('finished');createFeathers();const replacement = document.body.cloneNode(true);document.documentElement.replaceChild(replacement, document.body);window.location.reload();});</script></body></html>
